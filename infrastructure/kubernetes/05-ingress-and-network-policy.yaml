################################################################################
# Ingress for API Gateway - Route external traffic to services
# Note: In production, you may use AWS ALB Ingress Controller (Phase 1 ALB)
################################################################################

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: foretale-api-ingress
  namespace: default
  labels:
    app: foretale
    environment: dev
  annotations:
    # Use AWS ALB Ingress Controller if available (from Phase 1)
    # kubernetes.io/ingress.class: "alb"
    # alb.ingress.kubernetes.io/scheme: "internet-facing"
    # alb.ingress.kubernetes.io/target-type: "ip"
    
    # For nginx ingress controller
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"

spec:
  # TLS configuration
  tls:
  - hosts:
    - api.foretale.local
    secretName: foretale-tls-cert
  
  rules:
  - host: api.foretale.local
    http:
      paths:
      - path: /csv-processor
        pathType: Prefix
        backend:
          service:
            name: foretale-csv-processor-svc
            port:
              number: 80
      
      - path: /test-executor
        pathType: Prefix
        backend:
          service:
            name: foretale-test-executor-svc
            port:
              number: 80

---
################################################################################
# Network Policy - Restrict traffic between pods
################################################################################

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: foretale-network-policy
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: foretale
  policyTypes:
  - Ingress
  - Egress
  
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: default
    - podSelector:
        matchLabels:
          app: foretale
    ports:
    - protocol: TCP
      port: 8000
    - protocol: TCP
      port: 8001
  
  egress:
  # Allow DNS
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: UDP
      port: 53
  
  # Allow traffic to RDS
  - to:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 5432
  
  # Allow traffic to S3, DynamoDB, etc. (AWS services)
  - to:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 443
  
  # Allow inter-pod communication
  - to:
    - podSelector:
        matchLabels:
          app: foretale
    ports:
    - protocol: TCP
      port: 8000
    - protocol: TCP
      port: 8001

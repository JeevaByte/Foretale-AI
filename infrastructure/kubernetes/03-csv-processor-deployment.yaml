################################################################################
# CSV Data Upload Processor Deployment
# Processes uploaded CSV files and imports data to RDS
################################################################################

apiVersion: apps/v1
kind: Deployment
metadata:
  name: foretale-csv-processor
  namespace: default
  labels:
    app: foretale
    component: csv-processor
    environment: dev
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: foretale
      component: csv-processor
  template:
    metadata:
      labels:
        app: foretale
        component: csv-processor
        environment: dev
    spec:
      serviceAccountName: foretale-app-sa
      containers:
      - name: csv-processor
        # Image should be pushed to ECR - placeholder shown
        image: ACCOUNT_ID.dkr.ecr.us-east-2.amazonaws.com/foretale-csv-processor:latest
        imagePullPolicy: Always
        
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        
        env:
        # Load from ConfigMap
        - name: RDS_ENDPOINT
          valueFrom:
            configMapKeyRef:
              name: foretale-app-config
              key: RDS_ENDPOINT
        - name: RDS_PORT
          valueFrom:
            configMapKeyRef:
              name: foretale-app-config
              key: RDS_PORT
        - name: RDS_DATABASE
          valueFrom:
            configMapKeyRef:
              name: foretale-app-config
              key: RDS_DATABASE
        - name: RDS_USER
          valueFrom:
            configMapKeyRef:
              name: foretale-app-config
              key: RDS_USER
        - name: AWS_REGION
          valueFrom:
            configMapKeyRef:
              name: foretale-app-config
              key: AWS_REGION
        - name: S3_BUCKET_USER_UPLOADS
          valueFrom:
            configMapKeyRef:
              name: foretale-app-config
              key: S3_BUCKET_USER_UPLOADS
        
        # Load from Secret
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: foretale-db-secret
              key: DB_PASSWORD
        
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        
        # Liveness probe - restart if unhealthy
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        # Readiness probe - mark as ready for traffic
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        
        # Graceful shutdown
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 15"]
      
      # Affinity to spread pods across nodes
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: component
                  operator: In
                  values:
                  - csv-processor
              topologyKey: kubernetes.io/hostname

---
################################################################################
# CSV Processor Service
################################################################################

apiVersion: v1
kind: Service
metadata:
  name: foretale-csv-processor-svc
  namespace: default
  labels:
    app: foretale
    component: csv-processor
spec:
  type: ClusterIP
  selector:
    app: foretale
    component: csv-processor
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP

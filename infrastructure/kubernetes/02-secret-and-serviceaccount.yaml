################################################################################
# Kubernetes Secret for Database Credentials
# References AWS Secrets Manager secret
################################################################################

apiVersion: v1
kind: Secret
metadata:
  name: foretale-db-secret
  namespace: default
  labels:
    app: foretale
    environment: dev
type: Opaque
stringData:
  # IMPORTANT: These should be populated from AWS Secrets Manager
  # For now, use placeholder values - these will be injected via external-secrets operator
  # or manually managed via AWS Secrets Manager
  
  # Username and password should come from:
  # aws secretsmanager get-secret-value --secret-id foretale-dev-db-credentials
  DB_USER: "foretaleadmin"
  DB_PASSWORD: "changeme"  # PLACEHOLDER - Use AWS Secrets Manager in production
  DB_CONNECTION_STRING: "postgresql://foretaleadmin:changeme@foretale-dev-postgres.cny6oww6atkz.us-east-2.rds.amazonaws.com:5432/foretaledb"
  
---
################################################################################
# ServiceAccount for Pod IAM Access (IRSA)
# Allows pods to assume IAM role for RDS access
################################################################################

apiVersion: v1
kind: ServiceAccount
metadata:
  name: foretale-app-sa
  namespace: default
  labels:
    app: foretale
    environment: dev
  annotations:
    # This annotation is used by IRSA - populate with actual role ARN from terraform
    eks.amazonaws.com/role-arn: "arn:aws:iam::ACCOUNT_ID:role/foretale-dev-eks-pod-execution-role"

version: 0.2

# Security Scan BuildSpec - Trivy + ECR Scanning
# This runs after Docker build to scan for vulnerabilities

phases:
  install:
    commands:
      - echo "Installing Trivy security scanner..."
      - wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | apt-key add -
      - echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | tee -a /etc/apt/sources.list.d/trivy.list
      - apt-get update
      - apt-get install -y trivy

  pre_build:
    commands:
      - echo "Logging in to Amazon ECR..."
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - IMAGE_TAG=${COMMIT_HASH:=latest}
      - REPOSITORY_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$IMAGE_REPO_NAME
      - IMAGE_TO_SCAN=$REPOSITORY_URI:$IMAGE_TAG
      - echo "Scanning image: $IMAGE_TO_SCAN"

  build:
    commands:
      - echo "Security scan started on `date`"
      
      # ECR Native Scan Results
      - echo "Checking ECR native scan results..."
      - |
        SCAN_STATUS=$(aws ecr describe-image-scan-findings \
          --repository-name $IMAGE_REPO_NAME \
          --image-id imageTag=$IMAGE_TAG \
          --region $AWS_DEFAULT_REGION \
          --query 'imageScanStatus.status' \
          --output text 2>/dev/null || echo "PENDING")
      - echo "ECR Scan Status: $SCAN_STATUS"
      - |
        if [ "$SCAN_STATUS" == "COMPLETE" ]; then
          echo "ECR scan findings:"
          aws ecr describe-image-scan-findings \
            --repository-name $IMAGE_REPO_NAME \
            --image-id imageTag=$IMAGE_TAG \
            --region $AWS_DEFAULT_REGION \
            --query 'imageScanFindings.findingSeverityCounts'
        fi
      
      # Trivy Scan
      - echo "Running Trivy vulnerability scan..."
      - trivy image --severity HIGH,CRITICAL --exit-code 0 --no-progress $IMAGE_TO_SCAN
      
      # Save Trivy scan results
      - echo "Generating Trivy JSON report..."
      - trivy image --severity HIGH,CRITICAL --format json --output trivy-report.json $IMAGE_TO_SCAN
      
      # Check for CRITICAL vulnerabilities
      - echo "Checking for CRITICAL vulnerabilities..."
      - CRITICAL_COUNT=$(cat trivy-report.json | jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length')
      - echo "Found $CRITICAL_COUNT CRITICAL vulnerabilities"
      
      # Fail build if CRITICAL vulnerabilities found (production only)
      - |
        if [ "$CRITICAL_COUNT" -gt 0 ]; then
          echo "WARNING: $CRITICAL_COUNT CRITICAL vulnerabilities found!"
          echo "Review the scan results before deploying to production."
          # Uncomment next line to fail the build on CRITICAL vulnerabilities
          # exit 1
        fi

  post_build:
    commands:
      - echo "Security scan completed on `date`"
      - echo "Uploading scan results to S3..."
      - aws s3 cp trivy-report.json s3://foretale-codepipeline-artifacts-$ENVIRONMENT-$AWS_ACCOUNT_ID/security-scans/trivy-report-$IMAGE_TAG.json
      - echo "Scan report uploaded: s3://foretale-codepipeline-artifacts-$ENVIRONMENT-$AWS_ACCOUNT_ID/security-scans/trivy-report-$IMAGE_TAG.json"

artifacts:
  files:
    - trivy-report.json
  name: SecurityScanArtifact

reports:
  TrivySecurityReport:
    files:
      - trivy-report.json
    file-format: 'JSON'

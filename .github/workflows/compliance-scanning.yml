name: Compliance Scanning Workflow
on:
  schedule:
    # Run compliance scans weekly on Sundays at 2 AM UTC
    - cron: '0 2 * * 0'
  # Also allow manual trigger
  workflow_dispatch:
  # Run on pull requests
  pull_request:
    branches: [main, develop]

jobs:
  compliance-scan:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install compliance tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libopenscap8 openscap-scanner scap-security-guide \
            python3-pip jq yamllint
          
          pip3 install --upgrade \
            bandit safety semgrep checkov cloudmapper
      
      - name: Install Trivy
        uses: aquasecurity/setup-trivy@master
      
      - name: Run Trivy Repository Scan
        run: |
          mkdir -p compliance-scanning/trivy/reports
          trivy repo --severity High,Critical \
            --format json \
            --output compliance-scanning/trivy/reports/trivy-scan-$(date +%Y%m%d).json \
            .
      
      - name: Run Bandit Security Scan
        run: |
          mkdir -p compliance-scanning/owasp/reports
          find . -name "*.py" -type f | head -50 | xargs bandit -f json \
            -o compliance-scanning/owasp/reports/bandit-$(date +%Y%m%d).json || true
      
      - name: Run Checkov Infrastructure Scan
        run: |
          mkdir -p compliance-scanning/openscap/reports
          checkov -d . --framework terraform,kubernetes,dockerfile \
            --output json \
            --output-file compliance-scanning/openscap/reports/checkov-$(date +%Y%m%d).json || true
      
      - name: Run YAML Lint
        run: |
          mkdir -p compliance-scanning/owasp/reports
          find . -name "*.yaml" -o -name "*.yml" | xargs yamllint -f json \
            > compliance-scanning/owasp/reports/yamllint-$(date +%Y%m%d).json 2>/dev/null || true
      
      - name: Generate Compliance Report
        run: |
          cd compliance-scanning
          bash generate-master-report.sh
      
      - name: Upload Reports as Artifacts
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: compliance-reports
          path: compliance-scanning/reports/
          retention-days: 90
      
      - name: Comment PR with Results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('compliance-scanning/reports/compliance-summary-*.json', 'utf8'));
            
            const comment = `## 📊 Compliance Assessment Results

            **Overall Score:** ${report.report.overall_score}% PASS

            **Tools Executed:**
            ${report.report.tools.map(t => `- ✅ ${t.name}: ${t.status}`).join('\n')}

            **Frameworks Verified:**
            ${report.report.compliance_frameworks.map(f => `- ✅ ${f.name}: ${f.status}`).join('\n')}

            📄 Full report available in job artifacts.
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
      
      - name: Archive Reports
        if: always()
        run: |
          tar -czf compliance-reports-$(date +%Y%m%d_%H%M%S).tar.gz \
            compliance-scanning/reports/
          echo "Reports archived successfully"
      
      - name: Upload to S3 (Optional)
        if: always()
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          if [ ! -z "$AWS_ACCESS_KEY_ID" ]; then
            aws s3 cp compliance-reports-*.tar.gz \
              s3://foretale-compliance-reports/
          fi

  notify-slack:
    runs-on: ubuntu-latest
    needs: compliance-scan
    if: always()
    
    steps:
      - name: Slack Notification
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "Compliance Scan Complete",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Foretale-AI Compliance Assessment*\n\nStatus: ${{ needs.compliance-scan.result }}\nBranch: ${{ github.ref }}\nCommit: ${{ github.sha }}"
                  }
                }
              ]
            }
